<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Instroom.io</title>
  <link rel="stylesheet" href="instroom.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <img src="images/Instroom Logo 16x16.png" class="logo" alt="Instroom" />
      <h1 class="title">Instroom</h1>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      Fetching influencer insights<br>
      This will only take a moment.
    </div>

    <!-- Error -->
    <div id="error" class="error" style="display: none;"></div>

    <!-- Data -->
    <div id="profile-data" style="display: none">
      <div class="profile-header">
        <img id="profile-pic" class="profile-pic" src="images/instroomLogo.png" alt="Profile" />
        <div class="profile-text">
          <p class="username" id="username">Loading...</p>
          <p class="email" id="email">—</p>
        </div>
      </div>

      <div class="metrics-list">
        <div class="metric-item">
          <span class="metric-label"> Followers</span>
          <span class="metric-value highlight" id="followers">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">
            Engagement Rate
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="left" title="Engagement Rate = (Total interactions ÷ Followers) × 100"></i>
          </span>
          <span class="metric-value highlight" id="engagement-rate">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">
            Avg. Likes
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="left" title="Average likes on recent posts"></i>
          </span>
          <span class="metric-value" id="average-likes">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">
            Avg. Comments
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="left" title="Average comments on recent posts"></i>
          </span>
          <span class="metric-value" id="average-comments">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">
            Avg. Video Views
            <i class="bi bi-info-circle" data-bs-toggle="tooltip" data-bs-placement="left" title="Average Reel/Video views"></i>
          </span>
          <span class="metric-value" id="average-reel-plays">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Location</span>
          <span class="metric-value" id="country">—</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Remaining Credits</span>
          <span class="metric-value highlight" id="remaining-credits">—</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Initialize tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
      new bootstrap.Tooltip(el);
    });
  </script>
  <script src="instroom.js"></script>
</body>
</html>
